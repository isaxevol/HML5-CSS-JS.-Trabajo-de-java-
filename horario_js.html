<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIU - Sistema de Inscripción Universitaria v2.0 (JS)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    /* Pequeños estilos para la vista calendario */
    .calendar-table td, .calendar-table th { vertical-align: top; height: 60px; }
    .event { font-size: .8rem; background: #0d6efd; color: #fff; border-radius: .25rem; padding: .25rem .35rem; }
    .event .room{ opacity:.85; font-weight: 600; }
    .hourcell { white-space: nowrap; font-weight: 600; font-size: .9rem; }

    /* Badges de grupo con colores diferenciados */
    .badge-grupo-2 { background-color: #ffc107; color: #212529; } /* amarillo */
    .badge-grupo-3 { background-color: #20c997; color: #0b2e13; } /* verde menta */
    .badge-grupo-4 { background-color: #6f42c1; color: #fff; }    /* morado */

    /* Animación de desvanecido para cambio de vistas */
    .fade-container { opacity: 1; transition: opacity .25s ease-in-out; }
    /* Mantener fuera del flujo cuando está oculta para que no empuje el layout */
    .hidden { display: none !important; }
    .is-fading { opacity: 0; }
  </style>
</head>
<body class="bg-light text-dark">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">SIU-WEB</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <span class="nav-link active" aria-current="page">Sistemas de docentes</span>
          </li>
        </ul>
        <!-- Botones de vista alineados a la derecha -->
        <div class="d-flex gap-2 my-2 my-lg-0">
          <button id="btnLista" type="button" class="btn btn-primary">Vista Lista</button>
          <button id="btnCalendario" type="button" class="btn btn-outline-secondary">Vista Calendario</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="text-center mb-3">
      <h2 class="text-danger fw-bold">HORARIO ESTIPULADO</h2>
    </div>

    <!-- Vista Lista (similar al legacy) -->
    <section id="vistaLista">
      <div class="d-flex justify-content-end gap-2 my-3">
        <button type="button" class="btn btn-outline-primary" id="btnExport">Exportar Excel</button>
        <button type="button" class="btn btn-danger">Cerrar sesión</button>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover table-striped align-middle bg-white">
          <thead class="table-dark">
            <tr>
              <th scope="col" style="width:10%">Código</th>
              <th scope="col" style="width:30%">Asignatura</th>
              <th scope="col" style="width:10%">Grupo</th>
              <th scope="col" style="width:15%">Día</th>
              <th scope="col" style="width:20%">Horario</th>
              <th scope="col" style="width:15%">Aula</th>
            </tr>
          </thead>
          <tbody id="tbodyLista">
            <!-- Contenido generado con JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Vista Calendario: Eje Y generado por bucle y celdas vacías obligatorias -->
    <section id="vistaCalendario" class="hidden fade-container">
      <div class="table-responsive">
        <table class="table table-bordered calendar-table bg-white">
          <thead class="table-dark">
            <tr>
              <th style="width:10%">Hora</th>
              <th style="width:15%">Lunes</th>
              <th style="width:15%">Martes</th>
              <th style="width:15%">Miércoles</th>
              <th style="width:15%">Jueves</th>
              <th style="width:15%">Viernes</th>
              <th style="width:15%">Sábado</th>
            </tr>
          </thead>
          <tbody id="tbodyCalendario">
            <!-- Filas y celdas generadas 100% con JS -->
          </tbody>
        </table>
      </div>
    </section>

    <p class="text-center small">Sistema de Gestión Académica - Derechos Reservados 1999-2005</p>
  </main>

  <script src="./horario.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
